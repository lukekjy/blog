<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김재용 블로그 - Windows 98 Professional</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080; /* Windows 98 Teal */
            padding: 40px;
            font-family: "Pixelated MS Sans Serif", Arial, sans-serif;
            font-size: 16px;
        }
        .window {
            width: 1100px;
            max-width: 95%;
            margin: 0 auto;
        }
        .window-body {
            display: flex;
            gap: 15px;
            min-height: 700px;
        }
        .sidebar {
            flex: 1;
            border-right: 2px solid #dfdfdf;
            padding-right: 15px;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 3;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 700px;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
            background: white;
            border: 2px inset #808080;
        }
        .post-list li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #dfdfdf;
            font-size: 14px;
        }
        .post-list li:hover {
            background-color: #000080;
            color: white;
        }
        .post-list li.selected {
            background-color: #000080;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 5px;
            font-size: 14px;
        }
        textarea {
            height: 300px;
            resize: vertical;
        }
        /* Gallery Styles */
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: #c0c0c0;
            border: 2px inset #808080;
            min-height: 50px;
        }
        .image-item {
            position: relative;
            width: 150px;
            height: 150px;
            border: 2px outset #dfdfdf;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: zoom-in;
        }
        .image-item img {
            max-width: 100%;
            max-height: 100%;
        }
        .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            padding: 0 4px !important;
            min-width: auto !important;
            height: 18px;
            font-size: 10px;
            background: #c0c0c0;
            border: 2px outset #dfdfdf;
            cursor: pointer;
            z-index: 10;
        }
        /* View Mode Styles */
        #viewMode {
            padding: 10px;
            background: white;
            border: 2px inset #808080;
            flex-grow: 1;
            overflow-y: auto;
        }
        #viewTitle {
            font-size: 24px;
            margin-top: 0;
            border-bottom: 2px solid #000080;
            padding-bottom: 10px;
        }
        #viewContent {
            white-space: pre-wrap;
            line-height: 1.6;
            margin-top: 20px;
        }
        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid #dfdfdf;
            box-shadow: 0 0 20px black;
        }
        /* UI Utilities */
        .hidden { display: none !important; }
        .toolbar {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
        }
        .status-bar { margin-top: 15px; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-bar-text">김재용 블로그 Professional - Blog.exe</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>
    <div class="window-body">
        <div class="sidebar">
            <p><b>포스트 목록</b></p>
            <ul id="postList" class="post-list"></ul>
            <div class="toolbar" style="margin-top: 15px;">
                <button id="newPostBtn">새 포스트</button>
            </div>
        </div>
        <div class="main-content">
            <!-- VIEW MODE -->
            <div id="viewMode" class="hidden">
                <h1 id="viewTitle"></h1>
                <div id="viewGallery" class="image-gallery"></div>
                <div id="viewContent"></div>
                <div class="toolbar" style="margin-top: 20px;">
                    <button id="editBtn">편집 (E)</button>
                    <button id="deleteBtn" style="margin-left: auto;">삭제</button>
                </div>
            </div>

            <!-- EDIT MODE -->
            <div id="editMode">
                <div class="form-group">
                    <label for="postTitle">제목:</label>
                    <input type="text" id="postTitle" placeholder="제목을 입력하세요..." />
                </div>
                <div class="form-group">
                    <label>이미지 관리:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="postImageURL" placeholder="이미지 URL 입력..." style="flex: 1;" />
                        <button type="button" onclick="addImageFromURL()">URL 추가</button>
                        <input type="file" id="fileInput" accept="image/*" multiple style="display: none;" />
                        <button type="button" onclick="document.getElementById('fileInput').click()">파일 선택...</button>
                    </div>
                    <div id="editGallery" class="image-gallery"></div>
                </div>
                <div class="form-group">
                    <label for="postContent">내용:</label>
                    <textarea id="postContent" placeholder="여기에 내용을 입력하세요..."></textarea>
                </div>
                <div class="toolbar">
                    <button id="saveBtn">저장 및 보기 (S)</button>
                    <button id="cancelBtn" class="hidden">취소</button>
                </div>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <p class="status-bar-field" id="statusField">준비됨</p>
        <p class="status-bar-field">읽기/쓰기 모드 지원</p>
        <p class="status-bar-field">이미지 확대 기능 활성</p>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightboxImg" src="" alt="Enlarged view">
</div>

<script>
    let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
    let currentPostId = null;
    let currentImages = [];

    // Elements
    const postList = document.getElementById('postList');
    const viewMode = document.getElementById('viewMode');
    const editMode = document.getElementById('editMode');
    
    // View Mode Elements
    const viewTitle = document.getElementById('viewTitle');
    const viewContent = document.getElementById('viewContent');
    const viewGallery = document.getElementById('viewGallery');
    
    // Edit Mode Elements
    const postTitle = document.getElementById('postTitle');
    const postContent = document.getElementById('postContent');
    const editGallery = document.getElementById('editGallery');
    const postImageURL = document.getElementById('postImageURL');
    const fileInput = document.getElementById('fileInput');
    
    // Buttons
    const saveBtn = document.getElementById('saveBtn');
    const editBtn = document.getElementById('editBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const newPostBtn = document.getElementById('newPostBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const statusField = document.getElementById('statusField');

    // Utility: Show Lightbox
    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    // Image resizing function
    function resizeImage(img, callback) {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 1200;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', 0.8));
    }

    // Handlers
    fileInput.onchange = function(e) {
        const files = Array.from(e.target.files);
        let processed = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => resizeImage(img, (data) => {
                    currentImages.push(data);
                    renderGalleries();
                    processed++;
                    statusField.textContent = `이미지 처리 중... (${processed}/${files.length})`;
                });
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = '';
    };

    function addImageFromURL() {
        const url = postImageURL.value.trim();
        if (url) { currentImages.push(url); renderGalleries(); postImageURL.value = ''; }
    }

    function renderGalleries() {
        // Edit Mode Gallery
        editGallery.innerHTML = '';
        currentImages.forEach((src, idx) => {
            const div = document.createElement('div');
            div.className = 'image-item';
            div.innerHTML = `<img src="${src}"><button class="remove-img" onclick="event.stopPropagation(); removeImg(${idx})">X</button>`;
            div.onclick = () => openLightbox(src);
            editGallery.appendChild(div);
        });

        // View Mode Gallery
        viewGallery.innerHTML = '';
        currentImages.forEach((src) => {
            const div = document.createElement('div');
            div.className = 'image-item';
            div.innerHTML = `<img src="${src}">`;
            div.onclick = () => openLightbox(src);
            viewGallery.appendChild(div);
        });
        viewGallery.classList.toggle('hidden', currentImages.length === 0);
    }

    function removeImg(idx) {
        currentImages.splice(idx, 1);
        renderGalleries();
    }

    function switchMode(mode) {
        if (mode === 'view') {
            editMode.classList.add('hidden');
            viewMode.classList.remove('hidden');
        } else {
            viewMode.classList.add('hidden');
            editMode.classList.remove('hidden');
            cancelBtn.classList.toggle('hidden', currentPostId === null);
        }
    }

    function renderPosts() {
        postList.innerHTML = '';
        posts.forEach((post, index) => {
            const li = document.createElement('li');
            li.textContent = post.title;
            li.onclick = () => loadPost(index);
            if (currentPostId === index) li.classList.add('selected');
            postList.appendChild(li);
        });
    }

    function loadPost(index) {
        currentPostId = index;
        const post = posts[index];
        viewTitle.textContent = post.title;
        viewContent.textContent = post.content;
        currentImages = [...(post.images || [])];
        
        // Fill edit fields too
        postTitle.value = post.title;
        postContent.value = post.content;
        
        renderGalleries();
        renderPosts();
        switchMode('view');
        statusField.textContent = '포스트 로드됨';
    }

    function savePost() {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();
        if (!title) { alert('제목을 입력하세요!'); return; }

        const postData = { title, content, images: currentImages, date: new Date().toISOString() };
        if (currentPostId !== null) posts[currentPostId] = postData;
        else { posts.push(postData); currentPostId = posts.length - 1; }

        localStorage.setItem('blogPosts', JSON.stringify(posts));
        loadPost(currentPostId);
    }

    function startNewPost() {
        currentPostId = null;
        postTitle.value = '';
        postContent.value = '';
        currentImages = [];
        renderGalleries();
        renderPosts();
        switchMode('edit');
        postTitle.focus();
        statusField.textContent = '새 포스트 작성 중...';
    }

    // Button Events
    saveBtn.onclick = savePost;
    editBtn.onclick = () => switchMode('edit');
    cancelBtn.onclick = () => switchMode('view');
    newPostBtn.onclick = startNewPost;
    deleteBtn.onclick = () => {
        if (!confirm('정말로 삭제하시겠습니까?')) return;
        posts.splice(currentPostId, 1);
        localStorage.setItem('blogPosts', JSON.stringify(posts));
        startNewPost();
        statusField.textContent = '삭제 완료';
    };

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); savePost(); }
        if (e.key === 'e' && !viewMode.classList.contains('hidden')) { switchMode('edit'); }
    });

    // Initial State
    if (posts.length > 0) loadPost(0);
    else startNewPost();
</script>

</body>
</html>
