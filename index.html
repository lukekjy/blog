<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 전용 비밀 블로그 - Windows 98</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080;
            padding: 30px;
            font-family: "Pixelated MS Sans Serif", Arial, sans-serif;
            font-size: 14px;
        }
        .window {
            width: 1000px;
            max-width: 95%;
            margin: 0 auto;
        }
        #loginWindow {
            width: 320px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
        }
        .window-body {
            display: flex;
            gap: 15px;
            min-height: 650px;
        }
        .sidebar {
            flex: 1;
            border-right: 2px solid #dfdfdf;
            padding-right: 15px;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 3;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 650px;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
            background: white;
            border: 2px inset #808080;
        }
        .post-list li {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #dfdfdf;
            display: flex;
            justify-content: space-between;
        }
        .post-list li:hover, .post-list li.selected {
            background-color: #000080;
            color: white;
        }
        .post-author-tag {
            font-size: 10px;
            opacity: 0.7;
        }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="email"], textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 4px;
        }
        textarea { height: 350px; resize: vertical; }
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: #c0c0c0;
            border: 2px inset #808080;
            min-height: 50px;
        }
        .image-item {
            position: relative;
            width: 130px;
            height: 130px;
            border: 2px outset #dfdfdf;
            background: white;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: zoom-in;
        }
        .image-item img { max-width: 100%; max-height: 100%; }
        .remove-img {
            position: absolute; top: 2px; right: 2px;
            padding: 0 4px !important; min-width: auto !important; height: 18px;
            font-size: 10px; background: #c0c0c0; border: 2px outset #dfdfdf;
            cursor: pointer; z-index: 10;
        }
        #viewMode { padding: 20px; background: white; border: 2px inset #808080; flex-grow: 1; overflow-y: auto; }
        #viewTitle { font-size: 22px; margin-top: 0; border-bottom: 2px solid #000080; padding-bottom: 8px; margin-bottom: 5px; }
        #viewAuthor { font-size: 11px; color: #666; margin-bottom: 15px; }
        #viewContent { white-space: pre-wrap; line-height: 1.6; margin-top: 15px; }
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border: 4px solid #dfdfdf; }
        .hidden { display: none !important; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 5px; }
        .status-bar { margin-top: 15px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWindow" class="window">
    <div class="title-bar"><div class="title-bar-text">사용자 인증</div></div>
    <div class="window-body" style="display: block; min-height: auto; padding: 20px;">
        <div class="form-group">
            <label>이메일:</label>
            <input type="email" id="loginEmail" placeholder="family@email.com">
        </div>
        <div class="form-group">
            <label>비밀번호:</label>
            <input type="password" id="loginPassword">
        </div>
        <button id="loginBtn" style="width: 100%; margin-top: 10px;">로그인</button>
        <p id="loginError" style="color: red; font-size: 11px; margin-top: 5px;"></p>
    </div>
</div>

<!-- BLOG -->
<div id="blogWindow" class="window hidden">
    <div class="title-bar">
        <div class="title-bar-text">가족 비밀 블로그 - Blog.exe</div>
        <div class="title-bar-controls">
            <button id="logoutBtn" style="font-size: 10px; min-width: 50px;">로그아웃</button>
        </div>
    </div>
    <div class="window-body">
        <div class="sidebar">
            <p><b>포스트 목록</b></p>
            <ul id="postList" class="post-list"></ul>
            <button id="newPostBtn" style="margin-top: 10px;">새 포스트 작성</button>
        </div>
        <div class="main-content">
            <!-- VIEW MODE -->
            <div id="viewMode" class="hidden">
                <h1 id="viewTitle"></h1>
                <div id="viewAuthor"></div>
                <div id="viewGallery" class="image-gallery"></div>
                <div id="viewContent"></div>
                <div class="toolbar" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button id="editBtn">수정하기</button>
                    <button id="deleteBtn" style="margin-left: auto;">삭제</button>
                </div>
            </div>
            <!-- EDIT MODE -->
            <div id="editMode">
                <div class="form-group">
                    <label>제목:</label>
                    <input type="text" id="postTitle">
                </div>
                <div class="form-group">
                    <label>이미지 관리:</label>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                    <button type="button" onclick="document.getElementById('fileInput').click()">이미지 추가하기...</button>
                    <div id="editGallery" class="image-gallery"></div>
                </div>
                <div class="form-group">
                    <label>내용:</label>
                    <textarea id="postContent"></textarea>
                </div>
                <div class="toolbar" style="display: flex; gap: 10px;">
                    <button id="saveBtn">서버에 저장</button>
                    <button id="cancelBtn" class="hidden">취소</button>
                </div>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <p class="status-bar-field" id="statusField">서버 연결 중...</p>
        <p class="status-bar-field" id="userEmailField"></p>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightboxImg" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCx9VqGtY1oTPwcWc6PfGCeP--4sRDMWfM",
      authDomain: "my-blog-7a6ad.firebaseapp.com",
      projectId: "my-blog-7a6ad",
      storageBucket: "my-blog-7a6ad.firebasestorage.app",
      appId: "1:918789718204:web:2d61c1a84e9ed4c3d190b9"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });
    const auth = getAuth(app);
    const postsCol = collection(db, "posts");

    let posts = [];
    let currentPostId = null;
    let currentImages = [];

    // Global Elements
    const loginWindow = document.getElementById('loginWindow');
    const blogWindow = document.getElementById('blogWindow');
    const postList = document.getElementById('postList');
    const viewMode = document.getElementById('viewMode');
    const editMode = document.getElementById('editMode');
    const viewTitle = document.getElementById('viewTitle');
    const viewAuthor = document.getElementById('viewAuthor');
    const viewContent = document.getElementById('viewContent');
    const viewGallery = document.getElementById('viewGallery');
    const editGallery = document.getElementById('editGallery');
    const postTitle = document.getElementById('postTitle');
    const postContent = document.getElementById('postContent');
    const statusField = document.getElementById('statusField');
    const userEmailField = document.getElementById('userEmailField');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const fileInput = document.getElementById('fileInput');

    // AUTH
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginWindow.classList.add('hidden');
            blogWindow.classList.remove('hidden');
            userEmailField.textContent = user.email;
            initBlog();
        } else {
            loginWindow.classList.remove('hidden');
            blogWindow.classList.add('hidden');
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pw = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pw);
        } catch (e) {
            document.getElementById('loginError').textContent = "로그인 실패: 이메일 또는 비밀번호 확인";
        }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // BLOG LOGIC
    function initBlog() {
        onSnapshot(query(postsCol), (snapshot) => {
            posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            posts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            renderPosts();
            statusField.textContent = `✅ 서버 동기화 완료 (${posts.length}개)`;
        }, (err) => {
            statusField.textContent = "❌ 연결 오류";
        });
    }

    function renderPosts() {
        postList.innerHTML = '';
        posts.forEach(p => {
            const li = document.createElement('li');
            const authorShort = p.author ? p.author.split('@')[0] : "익명";
            li.innerHTML = `<span>${p.title || "(제목 없음)"}</span><span class="post-author-tag">${authorShort}</span>`;
            li.onclick = () => loadPost(p.id);
            if (currentPostId === p.id) li.classList.add('selected');
            postList.appendChild(li);
        });
    }

    function loadPost(id) {
        currentPostId = id;
        const p = posts.find(x => x.id === id);
        if (!p) return;
        viewTitle.textContent = p.title;
        viewAuthor.textContent = `작성자: ${p.author || "알 수 없음"}`;
        viewContent.textContent = p.content;
        currentImages = [...(p.images || [])];
        renderGalleries();
        switchMode('view');
    }

    function renderGalleries() {
        editGallery.innerHTML = '';
        viewGallery.innerHTML = '';
        currentImages.forEach((src, idx) => {
            // Edit View
            const divEdit = document.createElement('div');
            divEdit.className = 'image-item';
            divEdit.innerHTML = `<img src="${src}"><button class="remove-img">X</button>`;
            divEdit.querySelector('.remove-img').onclick = (e) => { 
                e.stopPropagation(); 
                currentImages.splice(idx, 1); 
                renderGalleries(); 
            };
            editGallery.appendChild(divEdit);
            
            // View Mode
            const divView = document.createElement('div');
            divView.className = 'image-item';
            divView.innerHTML = `<img src="${src}">`;
            divView.onclick = () => { 
                document.getElementById('lightboxImg').src = src; 
                document.getElementById('lightbox').style.display = 'flex'; 
            };
            viewGallery.appendChild(divView);
        });
        viewGallery.classList.toggle('hidden', currentImages.length === 0);
    }

    async function savePost() {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();
        if (!title) { statusField.textContent = "⚠️ 제목을 입력하세요!"; return; }

        saveBtn.disabled = true;
        statusField.textContent = "저장 중...";
        
        const data = { 
            title, 
            content, 
            images: currentImages, 
            author: auth.currentUser.email, // 작성자 이메일 저장
            createdAt: currentPostId ? (posts.find(p => p.id === currentPostId).createdAt || Date.now()) : Date.now(),
            updatedAt: Date.now() 
        };

        try {
            if (currentPostId) await updateDoc(doc(db, "posts", currentPostId), data);
            else {
                const docRef = await addDoc(postsCol, data);
                currentPostId = docRef.id;
            }
            statusField.textContent = "✅ 저장 완료";
            loadPost(currentPostId);
        } catch (e) {
            statusField.textContent = "❌ 저장 실패";
        } finally {
            saveBtn.disabled = false;
        }
    }

    function switchMode(mode) {
        viewMode.classList.toggle('hidden', mode !== 'view');
        editMode.classList.toggle('hidden', mode !== 'edit');
        cancelBtn.classList.toggle('hidden', currentPostId === null);
    }

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        statusField.textContent = "이미지 처리 중...";
        let loaded = 0;
        
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 600;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX/w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImages.push(canvas.toDataURL('image/jpeg', 0.6));
                    
                    loaded++;
                    if (loaded === files.length) {
                        renderGalleries();
                        statusField.textContent = `✅ 이미지 ${files.length}개 추가됨`;
                    }
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
    };

    saveBtn.onclick = savePost;
    document.getElementById('newPostBtn').onclick = () => {
        currentPostId = null; postTitle.value = ''; postContent.value = ''; currentImages = [];
        renderGalleries(); switchMode('edit'); postTitle.focus();
        statusField.textContent = "새 글 작성 중...";
    };
    document.getElementById('editBtn').onclick = () => {
        const p = posts.find(x => x.id === currentPostId);
        postTitle.value = p.title; postContent.value = p.content;
        switchMode('edit');
        statusField.textContent = "글 수정 중...";
    };
    document.getElementById('cancelBtn').onclick = () => loadPost(currentPostId);
    document.getElementById('deleteBtn').onclick = () => {
        if (!confirm("정말 삭제할까요?")) return;
        deletePost();
    };

    async function deletePost() {
        try {
            statusField.textContent = "삭제 중...";
            await deleteDoc(doc(db, "posts", currentPostId));
            currentPostId = null;
            document.getElementById('newPostBtn').onclick();
            statusField.textContent = "✅ 삭제 완료";
        } catch (e) {
            statusField.textContent = "❌ 삭제 실패";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); savePost(); }
        if (e.key === 'e' && !viewMode.classList.contains('hidden')) document.getElementById('editBtn').click();
    });
</script>
</body>
</html>
